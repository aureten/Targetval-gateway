# Wave-1 source — openFDA FAERS (rest). LIVE-VALIDATED quirks below.
source_name: openfda
display_name: openFDA (FAERS)
api_type: rest
base_url: https://api.fda.gov/drug/event.json
auth: key                          # optional api_key raises rate limit
auth_env_var: OPENFDA_API_KEY
rate_limit: { requests_per_second: 2.0, burst: 4 }
retry: { max_attempts: 3, backoff_base: 0.6, backoff_max: 12.0 }
timeout_seconds: 20.0
health_check_url: https://api.fda.gov/drug/event.json?limit=1
evidence_families: [clinical]
modules_served: [clin-safety, clin-rwe]
dependency_tags:
  - { type: shared_dataset, coupled_source: drugcentral, detail: "overlapping drug labels", discount: 0.6 }
# QUIRKS: HTTP 404 == "no records" -> map to NO_DATA, not error. `count` param must be a FIELD name,
# not a number. FAERS indexes DRUG names, not gene targets -> query by patient.drug.openfda.substance_name.
